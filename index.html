/** 認証 **/
async function apiLogin(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data.user;
}

async function apiLogout() {

async function apiGetMe() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return null;
  authUser = user;
  const { data } = await sb.from('accounts').select('*, sub_admin_scope!sub_admin_id(target_id)').eq('auth_uid', user.id).single();
  if (!data) return null;
  data.scope = (data.sub_admin_scope || []).map(s => s.target_id);
  return data;
}

/** アカウント管理 **/
async function apiFetchAccounts() {
  const { data } = await sb.from('accounts').select('*, sub_admin_scope!sub_admin_id(target_id)').order('created_at');
  return (data || []).map(a => ({ ...a, scope: (a.sub_admin_scope || []).map(s => s.target_id) }));
}

async function apiCreateAccount({ id, name, email, password, role, scope }) {
  // 1. Supabase Auth にユーザー作成（管理者権限が必要 → Service Role Key が必要）
  // ※ セキュリティのため、本番では Edge Function 経由で行う
  // ここでは Auth Admin API を使う代わりに、手順書通りダッシュボードで作成してもらう
  // 開発・デモ用として signUp を使用（確認メールOFF推奨）
  const { data: authData, error: authError } = await sb.auth.signUp({ email, password });
  if (authError) throw authError;
  const { error } = await sb.from('accounts').insert({ id, auth_uid: authData.user.id, name, role });
  if (error) throw error;
  if (role === 'sub' && scope.length) {
    await sb.from('sub_admin_scope').insert(scope.map(t => ({ sub_admin_id: id, target_id: t })));
  }
}

async function apiUpdateAccount({ id, name, role, scope }) {
  const { error } = await sb.from('accounts').update({ name, role }).eq('id', id);
  if (error) throw error;
  await sb.from('sub_admin_scope').delete().eq('sub_admin_id', id);
  if (role === 'sub' && scope.length) {
    await sb.from('sub_admin_scope').insert(scope.map(t => ({ sub_admin_id: id, target_id: t })));
  }
}

async function apiDeleteAccount(id) {

/** 勤怠 **/
async function apiFetchKintai(userId, year, month) {
  const from = `${year}-${String(month).padStart(2,'0')}-01`;
  const lastDay = new Date(year, month, 0).getDate();
  const to   = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const { data } = await sb.from('kintai_records')
    .select('*').eq('user_id', userId).gte('date', from).lte('date', to);
  // { 'YYYY-MM-DD': record } の形に変換
  const map = {};
  (data || []).forEach(r => {
    map[r.date] = {
      id: r.id,
      type: r.type,
      start: r.start_time ? r.start_time.slice(0,5) : '',
      end: r.end_time ? r.end_time.slice(0,5) : '',
      breakMin: r.break_min,
      remote: r.is_remote,
      trip: r.loc_trip,
      umeda: r.loc_umeda
    };
  });
  return map;
}

async function apiSaveKintai(userId, date, entry) {
  const record = {
    user_id: userId,
    date,
    type: entry.type,
    start_time: entry.start || null,
    end_time: entry.end || null,
    break_min: entry.breakMin || 60,
    is_remote: !!entry.remote,
    loc_remote: !!entry.remote,
    loc_trip: !!entry.trip,
    loc_umeda: !!entry.umeda
  };
  const { error } = await sb.from('kintai_records').upsert(record, { onConflict: 'user_id,date' });
  if (error) throw error;
}

async function apiDeleteKintai(userId, date) {
  await sb.from('kintai_records').delete().eq('user_id', userId).eq('date', date);
}

/** 工数 **/
async function apiFetchTasks(userId, year, month) {
  const from = `${year}-${String(month).padStart(2,'0')}-01`;
  const lastDay = new Date(year, month, 0).getDate();
  const to   = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const { data } = await sb.from('task_entries')
    .select('*').eq('user_id', userId).gte('date', from).lte('date', to).order('date');
  // { 'YYYY-MM-DD': [{proj,task,h,id}] } の形に変換
  const map = {};
  (data || []).forEach(r => {
    if (!map[r.date]) map[r.date] = [];
    map[r.date].push({ id: r.id, proj: r.project, task: r.task, h: parseFloat(r.hours), biz_type: r.biz_type, work_type: r.work_type });
  });
  return map;
}

async function apiSaveTaskEntries(userId, date, entries) {
  await sb.from('task_entries').delete().eq('user_id', userId).eq('date', date);
  if (entries.length) {
    const rows = entries.map(e => ({
      user_id: userId, date,
      project: e.proj, task: e.task, hours: e.h,
      biz_type: e.biz_type || null, work_type: e.work_type || null
    }));
    const { error } = await sb.from('task_entries').insert(rows);
    if (error) throw error;
  }
}

    entries: (g.paid_usages || []).map(u => ({ id: u.id, date: u.date, days: parseFloat(u.days) }))

}

    sb.from('tasks_master').select('id, project_id, name, projects(name)').order('id'),
    sb.from('biz_types').select('*').order('sort_order'),
    sb.from('work_types').select('*').order('sort_order')
  ]);
  bizTypesCache = bizTypes || [];
  workTypesCache = workTypes || [];
  return {
    projects: (projs || []).map(p => p.name),
    projectsRaw: projs || [],
    tasks: (tasks || []).map(t => ({ proj: t.projects?.name || '', name: t.name }))
  };
}

// ============================================================
// ヘルパー
// ============================================================
const DAY = ['日','月','火','水','木','金','土'];
const TL = { work:'出勤', paid:'有給', half:'半休', holiday:'祝日', remote:'在宅' };
const TB = { work:'bw', paid:'bp', half:'bh', holiday:'bho', remote:'br' };

function dk(y,m,d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function pT(t) { if(!t) return null; const [h,m]=t.split(':').map(Number); return h+m/60; }
function fH(h) { if(!h) return '0:00'; const hh=Math.floor(h), mm=Math.round((h-hh)*60); return `${hh}:${String(mm).padStart(2,'0')}`; }
function cW(e) { if(!e||!e.start||!e.end) return 0; return Math.max(0, pT(e.end)-pT(e.start)-(e.breakMin||60)/60); }
function gA(id) { return accounts.find(a => a.id === id); }
function isAdmin() { return me && me.role === 'admin'; }
function isSub() { return me && me.role === 'sub'; }
function canView(uid) {
  if (!me) return false;
  if (me.role === 'admin') return true;
  if (me.role === 'sub') return (me.scope||[]).includes(uid) || me.id === uid;
  return me.id === uid;
}
function canEdit(uid) { return me && (me.role === 'admin' || me.id === uid); }
function vMembers() { return accounts.filter(a => canView(a.id)); }

function gK(uid) {
  if (!kintaiCache[uid]) kintaiCache[uid] = {};
  return kintaiCache[uid];
}
function gT(uid) {
  if (!tasksCache[uid]) tasksCache[uid] = {};
  return tasksCache[uid];
}
function tH(uid, k) { return (gT(uid)[k] || []).reduce((s,t) => s+t.h, 0); }

function buildTabs() {
  const tabs = [
    { id:'dashboard', icon:'ti-layout-dashboard', label:'ダッシュボード', show:true },
    { id:'calendar',  icon:'ti-calendar',          label:'カレンダー',     show:true },
    { id:'list',      icon:'ti-table',             label:'集計',           show:true },
    { id:'workload',  icon:'ti-chart-bar',          label:'工数',           show:true },
    { id:'insight',   icon:'ti-bulb',               label:'インサイト',     show:true },
    { id:'paid',      icon:'ti-leaf',              label:'有給',           show:true },
    { id:'admin',     icon:'ti-users',             label:'チーム',         show:isAdmin()||isSub() },
    { id:'accounts',  icon:'ti-user-cog',          label:'アカウント',     show:isAdmin() },
    { id:'master',    icon:'ti-settings',          label:'案件設定',       show:isAdmin() },
  ];
  document.getElementById('tab-bar').innerHTML = tabs.filter(t=>t.show).map(t =>
    `<button class="tab" id="tab-${t.id}" onclick="showTab('${t.id}')"><i class="ti ${t.icon}" aria-hidden="true"></i> ${t.label}</button>`
  ).join('');
}

function initVSels() {
  const vm = vMembers();
  const opts = vm.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  ['cal-vsel','list-vsel','wl-vsel'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = opts; el.value = me.id;
    el.style.display = vm.length > 1 ? '' : 'none';
  });
  const pv = document.getElementById('paid-vsel');
  if (pv) { pv.innerHTML = opts; pv.value = paidVM || me.id; pv.style.display = vm.length > 1 ? '' : 'none'; }
}

function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tb = document.getElementById('tab-' + id);
  if (tb) tb.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');
  const renderers = {
    dashboard: renderDashboard,
    calendar:  renderCalendar,
    list:      renderList,
    workload:  renderWorkload,
    paid:      renderPaid,
    admin:     renderAdmin,
    accounts:  renderAccounts,
    master:    renderMaster,
    insight:   renderInsight,
  };
  if (renderers[id]) renderers[id]();
}

async function cm(d) {
  curM += d;
  if (curM > 12) { curM = 1; curY++; }
  if (curM < 1)  { curM = 12; curY--; }
  kintaiCache = {};
  tasksCache = {};
  const uid = getCurrentViewUID();
  showLoading('データ取得中...');
  try {
    const [kin, tsk] = await Promise.all([
      apiFetchKintai(uid, curY, curM),
      apiFetchTasks(uid, curY, curM)
    ]);
    kintaiCache[uid] = kin;
    tasksCache[uid] = tsk;
  } catch(e) { showError(e.message); }
  hideLoading();
  const a = document.querySelector('.section.active');
  if (a) showTab(a.id.replace('sec-',''));
}

function goToday() {
  const now = new Date();
  curY = now.getFullYear();
  curM = now.getMonth() + 1;
  kintaiCache = {};
  tasksCache = {};
  const a = document.querySelector('.section.active');
  if (a) showTab(a.id.replace('sec-',''));
}

function getCurrentViewUID() {
  const sels = ['cal-vsel','list-vsel','wl-vsel'];
  for (const id of sels) {
    const el = document.getElementById(id);
    if (el && el.closest('.section.active')) return el.value;
  }
  return me.id;
}

}

// ============================================================
// ダッシュボード
// ============================================================
function renderDashboard() {
  const uid = me.id;
  const now = new Date(); const y = now.getFullYear(), m = now.getMonth() + 1;
  const dim = new Date(y, m, 0).getDate();
  const md = gK(uid), mt = gT(uid);
  let wd=0, totalH=0, pd=0, tkH=0;
  const pmap = {};
  for (let d=1; d<=dim; d++) {
    const k = dk(y,m,d); const e = md[k]; const te = mt[k] || [];
    if (e && (e.type==='work'||e.type==='remote')) { wd++; totalH += cW(e); }
    if (e && e.type==='paid') pd++;
    if (e && e.type==='half') pd += 0.5;
    te.forEach(t => { tkH += t.h; if (!pmap[t.proj]) pmap[t.proj]=0; pmap[t.proj]+=t.h; });
  }
  const hr = now.getHours();
  document.getElementById('dash-greeting').textContent =
    `${hr<12?'おはようございます':'こんにちは'}、${me.name}さん　${y}年${m}月`;
  document.getElementById('dash-grid').innerHTML = `
    <div class="dcard"><div class="dcard-label"><i class="ti ti-calendar-check" aria-hidden="true"></i>稼働日数</div><div class="dcard-val">${wd}<span class="dcard-unit"> 日</span></div></div>
    <div class="dcard"><div class="dcard-label"><i class="ti ti-clock" aria-hidden="true"></i>総稼働時間</div><div class="dcard-val" style="font-size:18px">${fH(totalH)}</div></div>
    <div class="dcard"><div class="dcard-label"><i class="ti ti-briefcase" aria-hidden="true"></i>工数合計</div><div class="dcard-val">${tkH}<span class="dcard-unit"> H</span></div></div>
  `;
  const projs = Object.keys(pmap).sort((a,b) => pmap[b]-pmap[a]);
  const maxH = projs.length ? pmap[projs[0]] : 1;
  document.getElementById('dash-proj-bars').innerHTML = projs.map(p =>
    `<div style="margin-bottom:5px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span>${p}</span><span>${pmap[p]}H</span></div>
      <div style="background:var(--color-background-secondary);border-radius:3px;height:6px;overflow:hidden"><div style="width:${Math.round(pmap[p]/maxH*100)}%;height:100%;background:#378ADD;border-radius:3px"></div></div>
    </div>`
  ).join('') || '<div style="font-size:11px;color:var(--color-text-secondary)">工数データなし</div>';
  const allDays = [];
  for (let d=dim; d>=1; d--) { const k=dk(y,m,d); if(md[k]) allDays.push({k,e:md[k]}); if(allDays.length>=5) break; }
  document.getElementById('dash-recent').innerHTML = allDays.map(({k,e}) => {
    const dd=parseInt(k.split('-')[2]); const wd2=new Date(y,m-1,dd).getDay();
    return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px">
      <span>${m}/${dd}(${DAY[wd2]}) <span class="cbadge ${TB[e.type]}">${TL[e.type]}</span></span>
      <span style="color:var(--color-text-secondary)">${e.start&&e.end?e.start+'〜'+e.end:'—'}</span>
    </div>`;
  }).join('') || '<div style="font-size:11px;color:var(--color-text-secondary)">記録なし</div>';
}

function renderCalendar() {
  const uid = document.getElementById('cal-vsel')?.value || me.id;
  document.getElementById('mt1').textContent = `${curY}年${curM}月`;
  const first=new Date(curY,curM-1,1).getDay(), dim=new Date(curY,curM,0).getDate();
  const today=new Date(), todayK=dk(today.getFullYear(),today.getMonth()+1,today.getDate());
  const md=gK(uid), mt=gT(uid);
  let cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push({d, k:dk(curY,curM,d), wd:(first+d-1)%7, isT:dk(curY,curM,d)===todayK});
  while(cells.length%7) cells.push(null);
  const ed = canEdit(uid);
  let rows='';
  for(let i=0;i<cells.length;i+=7) {
    rows += '<tr>';
    for(let j=0;j<7;j++) {
      const c=cells[i+j];
      if(!c) { rows+='<td style="background:var(--color-background-secondary)"></td>'; continue; }
      const e=md[c.k]; const te=mt[c.k]||[]; const th=te.reduce((s,t)=>s+t.h,0);
      const dc=c.isT?'cal-today':`cal-date${c.wd===0?' sun':c.wd===6?' sat':''}`;
      let cnt='';
      if(e) { cnt+=`<span class="cbadge ${TB[e.type]}">${TL[e.type]}</span>`; if(e.start&&e.end) cnt+=`<br><span style="font-size:9px;color:var(--color-text-secondary)">${e.start}〜${e.end}</span>`; }
      if(th>0) cnt+=`<br><span style="font-size:9px;color:#185FA5;font-weight:500">${th}H</span>`;
      rows += `<td class="${ed?'clickable':''}" ${ed?`onclick="openKM('${c.k}','${uid}')"`:''}><div class="${dc}">${c.d}</div>${cnt}</td>`;
    }
    rows += '</tr>';
  }
  document.getElementById('cal-body').innerHTML = rows;
}

  const pw = document.getElementById('ma-pw').value;

  showLoading('保存中...');
  try {
    if (editAcctId) {
      await apiUpdateAccount({ id, name, role, scope });
      const a = gA(id); if (a) { a.name=name; a.role=role; a.scope=scope; }
      if (me.id === id) { me.name=name; me.role=role; me.scope=scope; }

function calcKintaiTime() {
  const s = document.getElementById('mk-s').value;
  const e = document.getElementById('mk-e').value;
  const b = parseInt(document.getElementById('mk-b').value) || 60;
  const el = document.getElementById('mk-calc');
  const sub = document.getElementById('mk-calc-sub');
  if (!el) return;
  if (!s || !e) { el.textContent = '—'; if(sub) sub.textContent = ''; return; }
  const sh = parseInt(s)*60 + parseInt(s.slice(3));
  const eh = parseInt(e)*60 + parseInt(e.slice(3));
  const total = Math.max(0, eh - sh - b);
  const h = Math.floor(total/60);
  const m = total % 60;
  el.textContent = `${h}時間${m>0?m+'分':''}`;
  const over = total - 8*60;
  if (!sub) return;
  sub.textContent = over > 0
    ? `（所定+${Math.floor(over/60)}時間${over%60>0?over%60+'分':''}）`
    : over < 0 ? `（所定-${Math.floor(Math.abs(over)/60)}時間${Math.abs(over)%60>0?Math.abs(over)%60+'分':''}）`
    : '（所定通り）';
  sub.style.color = over > 0 ? '#a32d2d' : over < 0 ? '#0f6e56' : '#888';
}

async function renderInsight() {

      hideLoading(); return;

    // 月ごとに集計
    const monthMap = {};
    allKintai.forEach(r => {
      const ym = r.date.slice(0,7);
      if (!monthMap[ym]) monthMap[ym] = { records:[], workDays:0, totalH:0, remDays:0, tripDays:0, over20:0 };
      const m = monthMap[ym];

          const eh = parseInt(e)*60+parseInt(e.slice(3));

          const h = Math.max(0, (eh - sh - bk) / 60);

let insMonthData = {}, insMonths = [];

function buildHmCells(records) {
  const recMap = {};
  records.forEach(r => {
    if (r.start_time && r.end_time) {
      const s=r.start_time.slice(0,5),e=r.end_time.slice(0,5);
      const sh=parseInt(s)*60+parseInt(s.slice(3));
      const eh=parseInt(e)*60+parseInt(e.slice(3));
      const h=Math.max(0,(eh-sh-(r.break_min||60))/60);
      recMap[r.date] = h;
    } else {
      recMap[r.date] = 0;
    }
  });

  function hmColor(h) {
    if (h <= 0) return '#e1e0d9';
    if (h < 7)  return '#e6f1fb';
    if (h < 8)  return '#b5d4f4';
    if (h < 9)  return '#85b7eb';
    if (h < 10) return '#378add';
    if (h < 11) return '#185fa5';
    return '#0c447c';
  }

  const today = new Date();
  const start = new Date(today.getFullYear()-1, today.getMonth(), today.getDate());
  let cur = new Date(start);
  const dow = cur.getDay();
  cur.setDate(cur.getDate() - (dow === 0 ? 6 : dow - 1));

  const weeks = []; let week = [];
  while (cur <= today || week.length) {
    const d = new Date(cur);
    const inRange = d >= start && d <= today;
    const dk = d.toISOString().slice(0,10);
    const h = recMap[dk] ?? -1;
    week.push({ d, inRange, h });
    cur.setDate(cur.getDate()+1);
    if (week.length === 7 || (cur > today && week.length)) { weeks.push(week); week=[]; }
  }

  let lastM=-1, mRow='', cols='';
  weeks.forEach(wk => {
    const m = wk[0].d.getMonth();
    if (m !== lastM) {
      mRow += `<div style="width:16px;font-size:10px;color:#aaa">${m+1}月</div>`;
      lastM = m;
    } else {
      mRow += `<div style="width:16px"></div>`;
    }
    let col = '';
    wk.forEach(day => {
      const bg = day.inRange && day.h >= 0 ? hmColor(day.h) : 'transparent';
      col += `<div style="width:13px;height:13px;border-radius:2px;background:${bg}" title="${day.inRange?day.d.toISOString().slice(0,10)+(day.h>0?' '+day.h.toFixed(1)+'H':''):''}"></div>`;
    });
    cols += `<div style="display:flex;flex-direction:column;gap:3px">${col}</div>`;
  });

  return `<div style="display:flex;align-items:flex-start">
    <div style="display:flex;flex-direction:column;gap:3px;margin-right:5px;padding-top:20px">
      ${['月','','水','','金','','日'].map(d=>`<div style="font-size:9px;color:#aaa;height:13px;display:flex;align-items:center">${d}</div>`).join('')}
    </div>
    <div>
      <div style="display:flex;gap:3px;margin-bottom:4px">${mRow}</div>
      <div style="display:flex;gap:3px">${cols}</div>
    </div>
  </div>`;
}

function drawBarChart(barData) {
  const svg = document.getElementById('bar-chart-svg');
  if (!svg) return;
  const W=640,H=160,pL=40,pR=10,pT=14,pB=32;
  const cW=W-pL-pR, cH=H-pT-pB;
  const allV = barData.flatMap(d=>[d.total,d.so]);
  const maxV=Math.max(...allV)+10, minV=Math.max(0,Math.min(...allV)-10);
  const yS=v=>pT+(1-(v-minV)/(maxV-minV))*cH;
  const n=barData.length, barW=cW/n;
  let html='';

  [140,160,180,200].forEach(v=>{
    if(v<minV||v>maxV)return;
    const y=yS(v);
    html+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#e1e0d9" stroke-width="0.5"/>`;
    html+=`<text x="${pL-3}" y="${y+3}" font-size="9" fill="#aaa" text-anchor="end">${v}</text>`;
  });

  barData.forEach((d,i)=>{
    const x=pL+i*barW+barW*0.1;
    const bw=barW*0.8;
    const y=yS(d.total);
    const bh=pT+cH-y;
    html+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="#378add" rx="2" opacity="0.8"/>`;
    if(n<=12||(i%3===0||i===n-1)){
      html+=`<text x="${x+bw/2}" y="${H-pB+13}" font-size="8" fill="#aaa" text-anchor="middle">${d.label}</text>`;
    }
  });

  // 所定ライン
  let lp='';
  barData.forEach((d,i)=>{
    const x=pL+i*barW+barW/2;
    const y=yS(d.so);
    lp+=(i===0?`M ${x} ${y}`:`L ${x} ${y}`);
  });
  html+=`<path d="${lp}" fill="none" stroke="#888" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4,3"/>`;
  barData.forEach((d,i)=>{
    const x=pL+i*barW+barW/2;
    const y=yS(d.so);
    html+=`<circle cx="${x}" cy="${y}" r="2" fill="#888"/>`;
  });

  svg.innerHTML=html;
}

function buildInsMonthBtns(months, monthMap) {
  const wrap = document.getElementById('ins-month-btns');
  if (!wrap) return;
  wrap.innerHTML='';
  const show = months.slice(-12);
  show.forEach((ym,i)=>{
    const btn=document.createElement('button');
    btn.textContent=ym.slice(2).replace('-','/');
    btn.style.cssText='padding:3px 8px;font-size:11px;border-radius:8px;border:0.5px solid #ddd;background:#f5f5f3;color:#888;cursor:pointer';
    btn.onclick=()=>{
      wrap.querySelectorAll('button').forEach(b=>{b.style.background='#f5f5f3';b.style.color='#888';});
      btn.style.background='#1a1a18';btn.style.color='#fff';
      drawDailyChart(ym, monthMap[ym].records);
    };
    if(i===show.length-1){btn.style.background='#1a1a18';btn.style.color='#fff';}
    wrap.appendChild(btn);
  });
}

function drawDailyChart(ym, records) {
  const svg = document.getElementById('daily-chart-svg');
  if (!svg) return;
  const W=640,H=110,pL=32,pR=10,pT=8,pB=26;
  const cW=W-pL-pR, cH=H-pT-pB;

  const days = records.filter(r=>r.start_time&&r.end_time).map(r=>{
    const s=r.start_time.slice(0,5),e=r.end_time.slice(0,5);
    const sh=parseInt(s)*60+parseInt(s.slice(3));
    const eh=parseInt(e)*60+parseInt(e.slice(3));
    const h=Math.max(0,(eh-sh-(r.break_min||60))/60);
    return {d:parseInt(r.date.slice(8)),h:Math.round(h*10)/10};
  }).sort((a,b)=>a.d-b.d);

  if (!days.length) { svg.innerHTML=''; return; }

  const maxH=Math.max(...days.map(d=>d.h),10), minH=5;
  const xS=i=>pL+i/(days.length-1||1)*cW;
  const yS=h=>pT+(1-(h-minH)/(maxH-minH))*cH;
  const base=yS(8);
  let html='';

  html+=`<rect x="${pL}" y="${pT}" width="${cW}" height="${base-pT}" fill="#fcebeb" opacity="0.4"/>`;
  html+=`<line x1="${pL}" y1="${base}" x2="${W-pR}" y2="${base}" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>`;
  html+=`<text x="${pL-2}" y="${base+3}" font-size="9" fill="#888" text-anchor="end">8H</text>`;

  let fillD='',pathD='';
  days.forEach((d,i)=>{
    const x=xS(i),y=yS(d.h);
    if(i===0){pathD+=`M ${x} ${y}`;fillD+=`M ${x} ${pT+cH} L ${x} ${y}`;}
    else{pathD+=` L ${x} ${y}`;fillD+=` L ${x} ${y}`;}
    if(i===days.length-1)fillD+=` L ${x} ${pT+cH} Z`;
  });
  html+=`<path d="${fillD}" fill="#378add" opacity="0.1"/>`;
  html+=`<path d="${pathD}" fill="none" stroke="#378add" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  days.forEach((d,i)=>{
    const x=xS(i),y=yS(d.h),over=d.h>8;
    html+=`<circle cx="${x}" cy="${y}" r="3.5" fill="${over?'#e24b4a':'#378add'}" stroke="white" stroke-width="1.5"/>`;
    if(days.length<=15||i%3===0||i===days.length-1){
      html+=`<text x="${x}" y="${H-pB+13}" font-size="8" fill="#aaa" text-anchor="middle">${d.d}</text>`;
    }
  });

  svg.innerHTML=html;

  const overDays=days.filter(d=>d.h>8).length;
  const avgH=(days.reduce((s,d)=>s+d.h,0)/days.length).toFixed(1);
  const maxDay=days.reduce((a,b)=>a.h>b.h?a:b);
  const el=document.getElementById('ins-daily-summary');
  if(el) el.textContent=`稼働日数 ${days.length}日 ／ 平均 ${avgH}H ／ 8H超過 ${overDays}日 ／ 最長 ${maxDay.h.toFixed(1)}H（${maxDay.d}日）`;
}

    </div>
    <div class="team-grid" id="team-grid"></div>
  </div>

  <!-- Accounts -->
  <div id="sec-accounts" class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
      <div style="font-size:13px;font-weight:500">アカウント管理</div>
      <button class="btn btn-p btn-sm" onclick="openAcctModal(null)"><i class="ti ti-plus"></i> 追加</button>
    </div>
    <table class="dt" style="cursor:pointer"><thead><tr><th>ID</th><th>氏名</th><th>権限</th><th>担当範囲</th></tr></thead><tbody id="acct-body"></tbody></table>
  </div>

  <!-- Master -->
  <div id="sec-master" class="section">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.25rem">
      <!-- 事業区分マスタ -->
      <div class="msec">
        <h3>事業区分マスタ</h3>
        <div class="mlist" id="biz-type-list"></div>
        <div class="ar">
          <input type="text" id="new-biz-type" placeholder="区分名..." style="max-width:160px">
          <button class="btn btn-sm" onclick="addBizType()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
      <!-- 作業区分マスタ -->
      <div class="msec">
        <h3>作業区分マスタ</h3>
        <div class="mlist" id="work-type-list"></div>
        <div class="ar">
          <input type="text" id="new-work-type" placeholder="区分名..." style="max-width:160px">
          <button class="btn btn-sm" onclick="addWorkType()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>
    <!-- 案件マスタ -->
    <div class="msec">
      <h3>案件マスタ</h3>
      <div id="proj-list" style="margin-bottom:.625rem;display:flex;flex-wrap:wrap;gap:4px"></div>
      <div class="ar">
        <input type="text" id="np" placeholder="案件名..." style="max-width:200px">
        <button class="btn btn-sm" onclick="addProj()"><i class="ti ti-plus"></i> 追加</button>
      </div>
    </div>
    <!-- タスクマスタ -->
    <div class="msec">
      <h3>タスクマスタ</h3>
      <div class="mlist" id="task-mlist"></div>
      <div class="ar">
        <div style="position:relative;display:inline-block">   <input type="text" id="ntp-input" placeholder="案件名で絞り込み..."     style="width:180px;font-size:12px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;padding:4px 8px"     oninput="filterNtpSuggest()" onfocus="filterNtpSuggest()" onblur="setTimeout(()=>hideNtpSuggest(),200)">   <input type="hidden" id="ntp" value="">   <div id="ntp-suggest" style="display:none;position:absolute;top:100%;left:0;background:#fff;border:0.5px solid rgba(0,0,0,.15);border-radius:6px;max-height:160px;overflow-y:auto;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:200px"></div> </div>
        <input type="text" id="ntn" placeholder="タスク名..." style="max-width:150px">
        <button class="btn btn-sm" onclick="addTaskM()"><i class="ti ti-plus"></i></button>
      </div>
    </div>
    <!-- テンプレートマスタ -->
    <div class="msec">
      <h3>工数テンプレート（自分のみ）</h3>
      <div id="template-list" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
  </div>
</div>
</div>

<!-- Kintai Modal -->
<div id="mk" class="mo" style="display:none" onclick="if(event.target===this)hm('mk')">
<div class="mc" onclick="event.stopPropagation()">
  <h3 id="mk-t">勤怠入力</h3>
  <div class="fr"><label>日付</label><input type="date" id="mk-d"></div>
  <div class="fr"><label>区分</label><select id="mk-type"><option value="work">出勤</option><option value="paid">有給</option><option value="half">半休</option><option value="holiday">祝日</option><option value="remote">在宅</option></select></div>
  <div class="fr"><label>出社 / 退社</label><div class="tr2"><input type="time" id="mk-s" oninput="calcKintaiTime()"><input type="time" id="mk-e" oninput="calcKintaiTime()"></div></div>
  <div class="fr"><label>休憩（分）</label><input oninput="calcKintaiTime()" type="number" id="mk-b" value="60" oninput="calcKintaiTime()" min="0" max="120" step="15"></div>
   <div style="background:#f5f5f3;border-radius:8px;padding:.5rem .875rem;font-size:12px;color:#888;margin-top:6px">
  稼働時間：<strong id="mk-calc" style="color:#1a1a18;font-size:14px">—</strong>
  <span style="font-size:11px;margin-left:8px" id="mk-calc-sub"></span>
</div>
  <div class="fr">
  <label style="font-size:12px;color:#888;display:block;margin-bottom:6px">勤務地（複数選択可）</label>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" id="mk-r" style="width:auto"> 在宅</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" id="mk-trip" style="width:auto"> 出張</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" id="mk-umeda" style="width:auto"> 梅田支店</label>
  </div>
</div>
  <div class="mbtns">
    <button class="btn btn-d" id="mk-del" onclick="delK()" style="display:none;margin-right:auto">削除</button>
    <button class="btn" onclick="hm('mk')">キャンセル</button>
    <button class="btn btn-p" onclick="saveK()">保存</button>
  </div>
</div></div>

<!-- Task Modal -->
<div id="mt" class="mo" style="display:none" onclick="if(event.target===this)hm('mt')">
<div class="mc" onclick="event.stopPropagation()" style="max-width:520px">
  <h3 id="mt-t">工数入力</h3>
  <div class="fr"><label>日付</label><input type="date" id="mt-d"></div>
  <div style="margin-bottom:8px">
    <div style="font-size:11px;color:#888;margin-bottom:4px">テンプレート</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center" id="tpl-btn-list">
      <span style="font-size:11px;color:#aaa">読み込み中...</span>
    </div>
  </div>
  <div class="tel" id="tel"></div>
  <div style="background:#f5f5f3;border-radius:8px;padding:.75rem;margin-bottom:8px">
    <div style="font-size:11px;color:#888;margin-bottom:6px">エントリー追加</div>
    <div style="position:relative;margin-bottom:6px">
      <input type="text" id="ta-proj-input" placeholder="案件名（入力で絞り込み）"
        style="width:100%;font-size:12px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;padding:5px 8px"
        oninput="filterProjSuggest()" onfocus="filterProjSuggest()" onblur="setTimeout(()=>hideProjSuggest(),200)">
      <div id="proj-suggest" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:0.5px solid rgba(0,0,0,.15);border-radius:6px;max-height:160px;overflow-y:auto;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
      <select id="ta-task" style="flex:1;min-width:110px;font-size:12px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;padding:4px 6px"><option value="">タスク</option></select>
      <select id="ta-biz" style="flex:1;min-width:90px;font-size:12px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;padding:4px 6px"><option value="">事業区分</option></select>
      <select id="ta-work" style="flex:1;min-width:90px;font-size:12px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;padding:4px 6px"><option value="">作業区分</option></select>
    </div>
    <div style="display:flex;gap:5px;align-items:center">
      <div class="hs" style="flex-shrink:0"><button onclick="adjNH(-0.5)">−</button><span id="nh-val">0.5</span><button onclick="adjNH(0.5)">＋</button></div>
      <span style="font-size:11px;color:#888">H</span>
      <button class="btn btn-sm" onclick="addTE()" style="margin-left:auto"><i class="ti ti-plus"></i> 追加</button>
    </div>
    <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(0,0,0,.08);display:flex;gap:5px;align-items:center">
      <input type="text" id="tpl-save-name" placeholder="テンプレ名（案件名省略可）"
        style="flex:1;font-size:11px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;padding:4px 8px">
      <button class="btn btn-sm" onclick="saveCurrentAsTemplate()" style="font-size:10px;white-space:nowrap">
        <i class="ti ti-bookmark"></i> 保存
      </button>
    </div>
  </div>
<div style="font-size:11px;color:#888;margin-bottom:4px" id="mt-kintai-info"></div>
<div style="font-size:11px;color:#888">合計: <strong id="mt-tot">0</strong> H &nbsp;／&nbsp; 直前を複製: <button class="btn btn-sm" onclick="duplicateLastEntry()" style="font-size:10px;padding:2px 8px"><i class="ti ti-copy"></i></button></div>
  <div class="mbtns"><button class="btn" onclick="hm('mt')">キャンセル</button><button class="btn btn-p" onclick="saveT()">保存</button></div>
</div></div>

<!-- Paid Modal -->
<div id="mp" class="mo" style="display:none" onclick="if(event.target===this)hm('mp')">
<div class="mc" onclick="event.stopPropagation()">
  <h3>有給取得を追加</h3>
  <div class="fr"><label>日付</label><input type="date" id="mp-d"></div>
  <div class="fr"><label>取得日数</label><select id="mp-days"><option value="1">1日</option><option value="0.5">0.5日（半休）</option></select></div>
  <div class="fr"><label>付与年度</label><select id="mp-yr"></select></div>
  <div class="mbtns"><button class="btn" onclick="hm('mp')">キャンセル</button><button class="btn btn-p" onclick="savePaid()">保存</button></div>
</div></div>

<!-- Account Modal -->
<div id="ma" class="mo" style="display:none" onclick="if(event.target===this)hm('ma')">
<div class="mc" onclick="event.stopPropagation()">
  <h3 id="ma-t">アカウント</h3>
  <div class="fr"><label>ユーザーID</label><input type="text" id="ma-id" placeholder="半角英数字（例: yamamoto）"></div>
  <div class="fr"><label>氏名</label><input type="text" id="ma-name"></div>
  <div class="fr" id="ma-email-wrap"><label>メールアドレス（新規のみ）</label><input type="email" id="ma-email"></div>
  <div class="fr"><label>パスワード（新規必須・変更時は空欄でOK）</label><input type="password" id="ma-pw"></div>
  <div class="fr"><label>権限</label><select id="ma-role" onchange="updRoleUI()"><option value="admin">管理者</option><option value="sub">準管理者</option><option value="member">一般</option></select></div>
  <div id="ma-scope-wrap" style="display:none"><div class="fr"><label>閲覧可能なメンバー</label><div class="scope-list" id="ma-scope-list"></div></div></div>
  <div class="err-msg" id="ma-err"></div>
  <div class="mbtns">
    <button class="btn btn-d" id="ma-del" onclick="delAcct()" style="display:none;margin-right:auto">削除</button>
    <button class="btn" onclick="hm('ma')">キャンセル</button>
    <button class="btn btn-p" onclick="saveAcct()">保存</button>
  </div>
</div></div>

</body>
</html>
